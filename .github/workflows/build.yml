name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 💾 Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-v1

      - name: 🦁 Build with buildozer-action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: .
          buildozer_version: stable

      - name: 📂 Find APK
        run: find . -name "*.apk" | head -5

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidONe-Scanner-SK-v6.1
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 90

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.1-build${{ github.run_number }}
          name: "🦁 MidONe Scanner SK v6.1 (Build #${{ github.run_number }})"
          body: |
            ## 🦁 MidONe Scanner SK v6.1
            اپ اندروید اسکنر شیر خورشید

            ### ✨ ویژگی‌ها
            - 🔍 CDN Auto-Detection (Cloudflare, Akamai, Google, Amazon, Azure, Fastly)
            - 🧪 Reliability x5 — هر IP 5 بار تست
            - ⚡ Real Bandwidth Test
            - 🚨 Throttle Detection
            - 📊 Advanced Scoring
            - 📋 Copy Top 5
            - 💾 Save to File
            - 🌙 Dark UI

            📣 [@mmdrlx](https://t.me/mmdrlx)
          files: ${{ steps.buildozer.outputs.filename }}
          token: ${{ secrets.GITHUB_TOKEN }}
