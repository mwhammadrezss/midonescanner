name: Build Android APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .buildozer_global
          key: buildozer-${{ hashFiles('buildozer.spec') }}-${{ github.ref }}
          restore-keys: |
            buildozer-${{ hashFiles('buildozer.spec') }}-
            buildozer-

      - name: Build APK with Buildozer (Docker)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MidONe-Scanner-APK
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: error

      - name: Copy APK to workspace (for releases)
        run: |
          mkdir -p release
          cp "${{ steps.buildozer.outputs.filename }}" release/
          ls -la release/

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: MidONe-Scanner-release
          path: release/*.apk
