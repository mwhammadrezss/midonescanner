name: Build Android APK with Buildozer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clear Buildozer Cache
      run: |
        rm -rf .buildozer/
        rm -rf ~/.buildozer/

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libgdbm-dev \
          libnss3-dev libssl-dev libreadline-dev \
          libffi-dev libsqlite3-dev sqlite3 \
          bzip2 libbz2-dev cmake ccache \
          libltdl-dev
        pip install --upgrade pip setuptools wheel virtualenv

    - name: Install Buildozer and Cython (pinned versions)
      run: |
        pip install buildozer==1.5.0
        pip install cython==0.29.37

    - name: Build Android APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MidONe-Scanner-APK
        path: bin/*.apk
